; teensy_usb_audio_tac5212 -- 24-bit / 48 kHz F32 round-trip test rig.
;
; AudioInputUSB_F32 (lib/USB_Audio_F32_24) -> output_tdm_f32 (OpenAudio) -> TAC5212
;     ^                                                                       |
;     |                                                                       v
; AudioOutputUSB_F32  <-  input_tdm_f32 (OpenAudio)  <-  TAC5212 ADC <-- 3.5mm loopback
;
; Uses the project's vendored teensy_cores overlay (cores_overlay.py) so the
; F32-native 24-bit USB ring buffers in lib/teensy_cores/teensy4/usb_audio_f32_buffers
; are present in the framework cache. AUDIO_SUBSLOT_SIZE=3 turns on the 24-bit
; USB descriptor and activates lib/USB_Audio_F32_24's F32 USB classes.
;
; USB_MIDI_AUDIO_SERIAL gives us a CDC-class Serial port for diagnostics
; (the alternative, USB_AUDIO, only gives SEREMU which `pio device monitor`
; supports but most other tools don't). The MIDI interface is unused here.

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

platform_packages =
    platformio/toolchain-gccarmnoneeabi-teensy@~1.110301.0

build_flags =
    -D USB_MIDI_AUDIO_SERIAL
    -D AUDIO_SUBSLOT_SIZE=3
    -D AUDIO_SAMPLE_RATE_EXACT=48000.0f
    -D AUDIO_SAMPLE_RATE_I=48000
    -D AUDIO_BLOCK_SAMPLES=128
    -std=gnu++17

build_unflags = -std=gnu++14

monitor_speed = 115200

lib_extra_dirs = ../../lib

extra_scripts = ../../tools/cores_overlay.py
