; teensy_usb_audio_tac5212: most basic possible USB-audio-to-TAC5212 sketch.
;
; Built on top of the teensy-4-usbAudio reference (references/teensy-4-usbAudio/).
; Stock 2-channel AudioInputUSB -> stock AudioOutputTDM -> TAC5212.
;
; The project-local overlay_teensy_usb_audio.py copies the reference's
; changedCorefiles/ verbatim onto PlatformIO's framework-arduinoteensy
; cache, then applies the gcc 11 toolchain override (same trick the rest
; of this repo uses; see ../../tools/cores_overlay.py for the long form).

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

platform_packages =
    platformio/toolchain-gccarmnoneeabi-teensy@~1.110301.0

; USB_AUDIO selects the simplest USB descriptor in the teensy-4-usbAudio
; reference: pure Audio Class + SEREMU for Serial. AUDIO_USB_CHANNEL_COUNT=2
; gates the descriptor down to a stereo-only enumeration. AUDIO_SUBSLOT_SIZE
; defaults to 2 (16-bit) -- we leave it unset to keep the data path stock.
build_flags =
    -D USB_AUDIO
    -D AUDIO_USB_CHANNEL_COUNT=2
    -D AUDIO_SAMPLE_RATE_EXACT=44100.0f
    -D AUDIO_SAMPLE_RATE_I=44100
    -D AUDIO_BLOCK_SAMPLES=128
    -std=gnu++17

build_unflags = -std=gnu++14

monitor_speed = 115200

lib_extra_dirs = ../../lib

extra_scripts = overlay_teensy_usb_audio.py
