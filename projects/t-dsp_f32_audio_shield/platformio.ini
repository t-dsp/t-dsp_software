; T-DSP F32 Audio Shield — fully F32 / 24-bit / 48 kHz port of the
; t-dsp_tac5212_audio_shield_adaptor project. No int16 audio anywhere.
;
; Phase 1 (this build): USB host <-> TAC5212 passthrough, all F32, with
; the typed lib/TAC5212 driver doing codec init and the same OSC dev
; surface the production project exposes (Tac5212Panel only — ADC6140
; / PDM mic / mixer graph / synths come in later phases).
;
; Audio path:
;   USB host -- 24-bit/48k -->  AudioInputUSB_F32  (lib/USB_Audio_F32_24)
;                                       |
;                              AudioOutputTDM_F32  (OpenAudio: 8 slots × 32-bit)
;                                       v
;                              SAI1 TX  -->  TAC5212 DAC --> OUT1/OUT2 jack
;                                                                  |
;                                                       (3.5mm cable loopback
;                                                        to INxP jack — for now)
;                                                                  |
;                              SAI1 RX  <--  TAC5212 ADC
;                                       |
;                              AudioInputTDM_F32   (OpenAudio)
;                                       v
;                              AudioOutputUSB_F32 -- 24-bit/48k --> USB host
;
; AUDIO_SUBSLOT_SIZE=3 activates the F32 USB classes (24-bit on the wire,
; F32 in the audio graph). USB_MIDI_AUDIO_SERIAL gives a CDC Serial port
; for the OSC dev surface alongside the USB Audio interface.

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; Override the platform-teensy 5.1.0 bundled gcc 5.4 with the gcc 11
; toolchain so the cores' C++17 (is_arithmetic_v, if constexpr, inline
; static members, std::align_val_t) compiles. cores_overlay.py at the
; repo tools/ also prepends this toolchain's bin/ to PATH.
platform_packages =
    platformio/toolchain-gccarmnoneeabi-teensy@~1.110301.0

build_flags =
    -D USB_MIDI_AUDIO_SERIAL
    -D AUDIO_SUBSLOT_SIZE=3
    -D AUDIO_SAMPLE_RATE_EXACT=48000.0f
    -D AUDIO_SAMPLE_RATE_I=48000
    -D AUDIO_BLOCK_SAMPLES=128
    -std=gnu++17

build_unflags = -std=gnu++14

monitor_speed = 115200

lib_extra_dirs = ../../lib

; synth_dexed (GPL v3) — 6-op FM synth engine. Pulled from upstream
; codeberg by PlatformIO at build time. Linking it makes the compiled
; firmware GPL v3; the repo-side MIT source is unaffected, but the
; flashed binary must be distributed under GPL v3 terms.
lib_deps =
    https://codeberg.org/dcoredump/synth_dexed.git

extra_scripts = ../../tools/cores_overlay.py
