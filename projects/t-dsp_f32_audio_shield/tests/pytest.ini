[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    hardware: test requires a connected Teensy running the f32 firmware
    audio: test requires a USB audio loopback cable + sounddevice
    slow: takes more than 5 s (xremote TTL renew, sweep tests)
addopts = -ra --strict-markers
