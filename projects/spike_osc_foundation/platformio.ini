; Spike 1 — OSC + F32 + library vendoring + cores overlay + multiplex foundation
;
; Validates that the vendored libraries (OSCAudio, OpenAudio_ArduinoLibrary,
; PaulStoffregen/Audio, PaulStoffregen/cores) all coexist in a single PlatformIO
; build for Teensy 4.1, that the cores overlay mechanism works, that SLIP-OSC
; over USB CDC multiplexes with plain debug text, and that two control surfaces
; (mixer-domain handlers + OSCAudio /teensy*/audio passthrough) coexist on the
; same dispatcher.
;
; See planning/osc-mixer-foundation/07-spike-plan.md#spike-1-foundation

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; PlatformIO platform-teensy 5.1.0 ships framework-arduinoteensy 1.153.0
; whose cores use C++17 features (is_arithmetic_v, if constexpr, inline
; static members, std::align_val_t) but bundles toolchain-gccarmnoneeabi
; 5.4.1 (2016) which doesn't support them. Pull in the Teensy-specific
; toolchain-gccarmnoneeabi-teensy 1.110301.0 (gcc 11.3.1) instead.
;
; On Windows, the package directory resolution requires a junction at
; ~/.platformio/packages/toolchain-gccarmnoneeabi pointing at
; ~/.platformio/packages/toolchain-gccarmnoneeabi-teensy so the platform's
; "toolchain-gccarmnoneeabi" reference resolves to the gcc 11 install:
;
;     cmd /c mklink /J ^
;       %USERPROFILE%\.platformio\packages\toolchain-gccarmnoneeabi ^
;       %USERPROFILE%\.platformio\packages\toolchain-gccarmnoneeabi-teensy
;
; (Junction works without admin; symlink:// in platform_packages does not
; on Windows without developer mode.) See
; planning/osc-mixer-foundation/07-spike-plan.md Spike 1 report for the
; longer-term plan to upstream this fix to platform-teensy.
platform_packages =
    platformio/toolchain-gccarmnoneeabi-teensy@~1.110301.0

; USB_MIDI_AUDIO_SERIAL gives us USB Audio + USB MIDI + USB CDC serial
; simultaneously on the same descriptor. The CDC serial is what carries
; SLIP-OSC + plain debug text + dotted-path CLI input.
build_flags =
    -D USB_MIDI_AUDIO_SERIAL
    -D OSCAUDIO_DEBUG_SURFACE
    -std=gnu++17

build_unflags = -std=gnu++14

monitor_speed = 115200

; Look in the repo's lib/ for libraries that PlatformIO finds via the normal
; LDF (OSCAudio, OpenAudio_ArduinoLibrary, future TDspMixer, etc).
;
; The Teensy core (lib/teensy_cores/) and CNMAT/OSC (lib/CNMAT_OSC/) are
; *not* found via lib_extra_dirs — they're overlaid into the framework cache
; by tools/cores_overlay.py before each compile (see extra_scripts below).
;
; lib/Audio/ is vendored but NOT yet active in this spike — it will be wired
; up via the same overlay mechanism in Spike 2 (multi-channel USB).
lib_extra_dirs = ../../lib

; Pull in our vendored libraries explicitly so PlatformIO's LDF finds them
; even though main.cpp doesn't transitively reference every header.
lib_deps =
    OSCAudio
    OpenAudio_ArduinoLibrary

; Apply the Teensy core/CNMAT_OSC overlay AND override the toolchain to gcc 11.
; The cores/CNMAT_OSC overlay copies lib/<name>/ over the corresponding
; framework cache subdirectory; the toolchain override Replaces the SCons
; env CC/CXX/etc. to point at toolchain-gccarmnoneeabi-teensy/bin/.
;
; Must NOT be `pre:` — pre scripts run before platform-teensy sets up its
; toolchain env, so any env.Replace() done in a pre script gets clobbered by
; the platform's own setup later. Default (no prefix) runs at the right time.
extra_scripts = ../../tools/cores_overlay.py
