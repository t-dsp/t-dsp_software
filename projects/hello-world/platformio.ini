; T-DSP Hello World — Teensy 4.1
; Verifies USB serial communication with the board

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; Use USB Serial for communication
build_flags = -D USB_SERIAL

; Monitor settings
monitor_speed = 115200

; Shared libraries live at the repo root
lib_extra_dirs = ../../lib
