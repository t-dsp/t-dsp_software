; T-DSP MTP Disk — companion firmware for content authoring.
;
; Tiny sketch that exposes the Teensy 4.1's BUILTIN_SDCARD as a USB MTP
; storage device on the host (Windows / macOS / Linux). Use this when
; you need to copy sample banks (WAV files) to the SD card without
; pulling it out — flash this firmware, copy your files via Explorer
; / Finder, then flash the audio firmware (t-dsp_f32_audio_shield) back.
;
; The orchestration script tools/file_mode.sh automates the swap.
;
; Mutually exclusive with the audio firmware: USB_MTPDISK_SERIAL
; replaces USB_MIDI_AUDIO_SERIAL on the descriptor — you can't have
; both audio class AND MTP class active simultaneously on Teensy 4.1.

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

platform_packages =
    platformio/toolchain-gccarmnoneeabi-teensy@~1.110301.0

build_flags =
    -D USB_MTPDISK_SERIAL
    -std=gnu++17

build_unflags = -std=gnu++14

monitor_speed = 115200

lib_extra_dirs = ../../lib

extra_scripts = ../../tools/cores_overlay.py
