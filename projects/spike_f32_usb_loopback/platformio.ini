; Spike: USB stereo (24-bit/48k, F32 native) -> F32 mixer -> TDM slots 0/1
; Validates the new lib/Audio_F32_TDM and lib/USB_Audio_F32_24 plumbing
; before the production project is ported to the F32 path.

[env:teensy41_f32_24]
platform = teensy
board = teensy41
framework = arduino

; Same gcc 11 toolchain override as the production project — see the parent
; project's platformio.ini for the long form.
platform_packages =
    platformio/toolchain-gccarmnoneeabi-teensy@~1.110301.0

; Milestone 3 build flags. USB_AUDIO + AUDIO_SUBSLOT_SIZE=3 activates the
; 24-bit / 48 kHz USB Audio Class descriptor in the vendored teensy_cores
; (lib/teensy_cores/teensy4/usb_desc.{h,c}). The audio data path itself
; still goes through the stock int16 usb_audio.cpp at this milestone — the
; F32-native classes land at M4. This intermediate state is meant to verify
; that the host enumerates the device as 24-bit / 48 kHz; audio is silent
; (or worse) at this stage by design.
; USB_MIDI_AUDIO_SERIAL gives us a real CDC-class Serial port (vs HID
; SEREMU under bare USB_AUDIO), which `pio device monitor` can read for
; the M4e diagnostic loop. The MIDI interface is unused. M3's descriptor
; gating is keyed on AUDIO_INTERFACE + AUDIO_SUBSLOT_SIZE==3, so the
; 24-bit/48k Audio Class config is identical to the bare USB_AUDIO build.
build_flags =
    -D USB_MIDI_AUDIO_SERIAL
    -D AUDIO_SUBSLOT_SIZE=3
    -D AUDIO_SAMPLE_RATE_EXACT=48000.0f
    -D AUDIO_BLOCK_SAMPLES=128
    -std=gnu++17

build_unflags = -std=gnu++14

monitor_speed = 115200

lib_extra_dirs = ../../lib

extra_scripts = ../../tools/cores_overlay.py
