; T-DSP TAC5212 Audio Shield Adaptor
; Teensy 4.1 + TAC5212 codec module

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; Override the platform-teensy 5.1.0 bundled gcc 5.4.1 toolchain with
; toolchain-gccarmnoneeabi-teensy 1.110301.0 (gcc 11.3.1), which actually
; supports the C++17 features (is_arithmetic_v, if constexpr, inline
; static members, std::align_val_t) that framework-arduinoteensy 1.153.0
; core headers use. See planning/osc-mixer-foundation/07-spike-plan.md
; Spike 1 for the long-form justification.
platform_packages =
    platformio/toolchain-gccarmnoneeabi-teensy@~1.110301.0

; USB_MIDI_AUDIO_SERIAL enables USB audio (Teensy appears as soundcard)
; while keeping Serial for debugging.
build_flags =
    -D USB_MIDI_AUDIO_SERIAL
    -std=gnu++17

build_unflags = -std=gnu++14

monitor_speed = 115200

; Shared libraries at repo root (lib/TAC5212/, vendored OSCAudio /
; OpenAudio_ArduinoLibrary / Audio / etc).
lib_extra_dirs = ../../lib

; Apply the cores/CNMAT_OSC framework overlay AND prepend the gcc 11
; toolchain bin/ to PATH. Same mechanism Spike 1 uses — the overlay
; script handles both concerns. Must not be pre: — pre scripts run
; before platform-teensy sets up its toolchain env and get clobbered.
extra_scripts = ../../tools/cores_overlay.py
