; T-DSP TAC5212 Audio Shield Adaptor
; Teensy 4.1 + TAC5212 codec module

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; USB_MIDI_AUDIO_SERIAL enables USB audio (Teensy appears as soundcard)
; while keeping Serial for debugging
build_flags = -D USB_MIDI_AUDIO_SERIAL

monitor_speed = 115200

; Shared libraries at repo root
lib_extra_dirs = ../../lib
